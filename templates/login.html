<div style="max-width:380px;margin:80px auto;padding:30px;background:#1e1e2f;
            border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.5);
            font-family:'Segoe UI',Roboto,sans-serif;color:#f5f5f5;">

  <h2 style="text-align:center;margin-bottom:20px;color:#ff9800;font-weight:bold;">
    Login
  </h2>

  <form method="post" style="display:flex;flex-direction:column;gap:15px;">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit"
      style="padding:12px;background:linear-gradient(135deg,#ff9800,#e91e63);
             border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:bold;
             cursor:pointer;transition:0.3s ease;">
      Login
    </button>
  </form>

  <p style="text-align:center;margin-top:15px;font-size:13px;color:#bbb;">
    Don’t have an account? 
    <a href="{% url 'register' %}" style="color:#ff9800;text-decoration:none;font-weight:500;">
      Register here
    </a>
  </p>
</div>
