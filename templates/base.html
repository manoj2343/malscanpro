<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MalScanPro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% load static %}

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    {% block head %}{% endblock %}
</head>
<body class="bg-dark text-light">

    <!-- Header Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'scan_combined' %}">
                🛡️ MalScanPro
            </a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-light" href="{% url 'scan_combined' %}">Scanner</a>
                        {% if user.is_authenticated %}
                        <!-- <li>Welcome, {{ user.username }}</li> -->
                        <li><a class="nav-link text-light" href="{% url 'logout' %}">Logout</a></li>
                        {% else %}
                        <li><a class="nav-link text-light" href="{% url 'login' %}">Login</a></li>
                        <li><a class="nav-link text-light" href="{% url 'register' %}">Register</a></li>
                        {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center bg-secondary text-light py-3 mt-auto">
        <div class="container">
            <p class="mb-0">© {{ now|default:2025 }} MalScanPro | Securing your uploads with intelligence.</p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
