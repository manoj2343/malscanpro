   <div style="max-width:400px;margin:80px auto;padding:30px;background:#1e1e2f;
   border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.5);color:#f5f5f5;
   font-family:'Segoe UI',Roboto,sans-serif;">

<h2 style="text-align:center;margin-bottom:20px;color:#00bcd4;font-weight:bold;letter-spacing:1px;">
Create Account
</h2>

<form method="post" style="display:flex;flex-direction:column;gap:15px;">
{% csrf_token %}
{{ form.as_p }}
<button type="submit" 
style="padding:12px;background:linear-gradient(135deg,#00bcd4,#3f51b5);
    border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:bold;
    cursor:pointer;transition:0.3s ease;">
Register
</button>
</form>

<p style="text-align:center;margin-top:15px;font-size:13px;color:#bbb;">
Already have an account? 
<a href="{% url 'login' %}" style="color:#00bcd4;text-decoration:none;font-weight:500;">
Login here
</a>
</p>
</div>
